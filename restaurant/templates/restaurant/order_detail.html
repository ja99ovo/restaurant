<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>查看订单</title>
    <style>
        .order-container {
            width: 80%;
            margin: 20px auto;
            padding: 15px;
            border: 1px solid #ddd;
        }

        .order-item {
            border-bottom: 1px solid #eee;
            padding: 10px 0;
        }

        .order-item:last-child {
            border-bottom: none;
        }

        .order-total {
            font-weight: bold;
            text-align: right;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="order-container">
        <h2>订单详情</h2>

        {% for item in order_items %}
        <div class="order-item">
            <span>商品名称: {{ item.name }}</span><br>
            <span>数量: {{ item.quantity }}</span><br>
            <span>价格: {{ item.price }}</span>
        </div>
        {% endfor %}

        <div class="order-total">
            总计: {{ order_total }}
        </div>
    </div>

</body>
</html>
